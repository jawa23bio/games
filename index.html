<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Package</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevents scrollbars when target moves */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #header {
            text-align: center;
            padding: 20px;
            background-color: #1f1f1f;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: #ff9800; }
        p { margin: 0; color: #aaaaaa; }

        #score-board {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4caf50;
            margin-top: 10px;
        }

        /* The Game Area */
        #game-area {
            position: relative;
            width: 100vw;
            height: calc(100vh - 120px);
        }

        /* The Moving Target */
        #target {
            position: absolute;
            font-size: 3rem; /* Size of the emoji */
            cursor: pointer;
            user-select: none;
            transition: top 0.2s, left 0.2s; /* Smooth jumping */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
        }

        /* The Reward Screen (Hidden by default) */
        #reward-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .reward-title {
            font-size: 2rem;
            color: #ff9800;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #2c2c2c;
            color: #ffffff;
            border: 2px solid #ff9800;
            padding: 15px 20px;
            margin: 10px 0;
            width: 80%;
            max-width: 300px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-btn:hover { background-color: #ff9800; color: #121212; }

        #final-message {
            display: none;
            font-size: 1.5rem;
            color: #4caf50;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>US ➡️ India Delivery</h1>
        <p>Tap the flying package 10 times to secure your drop!</p>
        <div id="score-board">Score: <span id="score">0</span> / 10</div>
    </div>

    <div id="game-area">
        <div id="target" onclick="catchPackage()">📦</div>
    </div>

    <div id="reward-screen">
        <div class="reward-title">DELIVERY SECURED!</div>
        <p style="margin-bottom: 30px;">Great reflexes. Now, choose your prize from the US:</p>
        
        <button class="option-btn" onclick="claimPrize('Tanglish Letter/Poem')">1. Tanglish Letter/Poem</button>
        <button class="option-btn" onclick="claimPrize('Music Track / Playlist')">2. Music / Spotify Vibe</button>
        <button class="option-btn" onclick="claimPrize('Physical Item from the US')">3. Physical US Item</button>
        <button class="option-btn" onclick="claimPrize('Zomato Feast')">4. Zomato Midnight Feast</button>

        <div id="final-message"></div>
    </div>

    <script>
        let score = 0;
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score');
        const gameArea = document.getElementById('game-area');
        const rewardScreen = document.getElementById('reward-screen');
        let moveInterval;

        // Function to move the target to a random position
        function moveTarget() {
            // Get dimensions, subtracting the target size so it doesn't go off screen
            const maxX = gameArea.clientWidth - 60; 
            const maxY = gameArea.clientHeight - 60;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';
        }

        // Move the target every 800 milliseconds
        function startGame() {
            moveTarget(); // Initial move
            moveInterval = setInterval(moveTarget, 800);
        }

        // When the package is clicked
        function catchPackage() {
            score++;
            scoreDisplay.innerText = score;

            if (score >= 10) {
                // Win condition met
                clearInterval(moveInterval);
                target.style.display = 'none'; // Hide the package
                rewardScreen.style.display = 'flex'; // Show rewards
            } else {
                // Immediately jump to a new spot when clicked to make it harder
                moveTarget(); 
            }
        }

        // When a prize is clicked
        function claimPrize(prizeName) {
            // Hide the buttons
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.style.display = 'none');
            
            // Show the final instruction
            const finalMsg = document.getElementById('final-message');
            finalMsg.style.display = 'block';
            finalMsg.innerHTML = `You chose:<br><strong>${prizeName}</strong><br><br><span style="font-size: 1rem; color: #aaa;">Screenshot this and send it to me!</span>`;
        }

        // Start the jumping logic
        startGame();
    </script>
</body>
</html>
